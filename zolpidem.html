<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>졸피뎀 반감기 계산기 | Daily Health Tools</title>
  <meta name="description" content="졸피뎀 복용 후 체내 잔존량을 계산해보세요. 반감기를 기반으로 시간별 감소량을 확인할 수 있습니다.">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    canvas { margin-top: 20px; }
  </style>
</head>
<body>

<h1>💊 졸피뎀 반감기 계산기</h1>

<label>복용량 (mg)</label>
<input type="number" id="dose" placeholder="예: 10">

<label>복용 후 경과 시간 (시간)</label>
<input type="number" id="time" placeholder="예: 8">

<button onclick="calculate()">계산하기</button>

<h2 id="result"></h2>

<canvas id="chart"></canvas>

<hr>

<h2>졸피뎀 반감기란?</h2>
<p>
졸피뎀은 대표적인 수면제로, 일반적으로 약 2~3시간의 반감기를 가집니다.
반감기란 체내 약물 농도가 절반으로 감소하는 데 걸리는 시간을 의미합니다.
</p>

<p>
예를 들어 10mg을 복용했다면 약 2~3시간 후에는 5mg,
그 이후에는 점점 더 감소하게 됩니다. 하지만 개인의 간 기능, 나이,
복용 습관 등에 따라 차이가 발생할 수 있습니다.
</p>

<p>
이 계산기는 참고용이며 실제 약물 효과나 운전 가능 여부를 판단하는 기준이 될 수 없습니다.
</p>

<script>
let chart;

function calculate() {
  const dose = parseFloat(document.getElementById("dose").value);
  const time = parseFloat(document.getElementById("time").value);

  if (!dose || !time) {
    alert("값을 입력해주세요");
    return;
  }

  const halfLife = 2.5; // 졸피뎀 평균 반감기 (시간)

  const remaining = dose * Math.pow(0.5, time / halfLife);

  document.getElementById("result").innerText =
    "현재 체내 잔존량: " + remaining.toFixed(2) + " mg";

  // 그래프 데이터 생성
  const labels = [];
  const data = [];

  for (let t = 0; t <= 24; t++) {
    labels.push(t + "h");
    data.push(dose * Math.pow(0.5, t / halfLife));
  }

  if (chart) {
    chart.destroy();
  }

  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '체내 잔존량 (mg)',
        data: data,
        borderWidth: 2,
        fill: false
      }]
    },
    options: {
      responsive: true
    }
  });
}
</script>

</body>
</html>
